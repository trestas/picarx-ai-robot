slam_toolbox:
  ros__parameters:

    use_sim_time: false

    # frames
    map_frame: map
    odom_frame: odom
    base_frame: base_link
    scan_topic: /scan

    # mode
    mode: mapping

    # publish
    publish_tf: true

    # resolution
    resolution: 0.05

    # range
    max_laser_range: 12.0

    # performance
    transform_timeout: 0.2
    tf_buffer_duration: 30.0

    # scan processing
    minimum_time_interval: 0.1

    # loop closure
    loop_closure_enabled: true
