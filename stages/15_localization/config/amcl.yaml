amcl:
  ros__parameters:
    use_sim_time: false

    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2

    base_frame_id: "base_link"
    odom_frame_id: "odom"
    global_frame_id: "map"

    scan_topic: /scan
    tf_broadcast: true

    min_particles: 200
    max_particles: 500

    kld_err: 0.05
    kld_z: 0.99

    update_min_d: 0.05
    update_min_a: 0.05

    resample_interval: 1
    transform_tolerance: 1.0

    recovery_alpha_slow: 0.0
    recovery_alpha_fast: 0.0

    robot_model_type: "nav2_amcl::DifferentialMotionModel"

    laser_model_type: "likelihood_field"
    max_beams: 60
    z_hit: 0.5
    z_short: 0.05
    z_max: 0.05
    z_rand: 0.5
    sigma_hit: 0.2
    lambda_short: 0.1
    laser_likelihood_max_dist: 2.0

    set_initial_pose: false
    always_reset_initial_pose: false

    first_map_only: true
